<header class="site-header">
  <a class="site-logo" href="{{ "/" | relLangURL }}">
    <span class="site-logo__mark" aria-hidden="true">{{ partial "icon-chefhat.svg" . }}</span>
    <span class="site-logo__text">NoNonsenseCooking</span>
  </a>
  <button type="button" class="nav-toggle" aria-expanded="false" aria-controls="site-nav" id="nav-toggle">
    <span class="visually-hidden">Menu</span>
    {{ partial "icon-menu.svg" . }}
  </button>
  <div class="site-nav-wrap" id="site-nav">
    <nav class="site-nav" aria-label="Main">
      <a class="site-nav__link" href="{{ "/r/" | relLangURL }}">{{ i18n "header.link.allrecipes" }}</a>
      <a class="site-nav__link" href="{{ "/r/" | relLangURL }}" data-random-recipe rel="nofollow">
        {{- partial "icon.html" (dict "id" "shuffle" "size" 18) -}}
        <span>{{ i18n "header.link.random" }}</span>
      </a>
      <form class="search-form" id="search-form" role="search" action="{{ "/search/" | relLangURL }}" method="get">
        <button type="submit" class="search-form__btn" aria-label="Search">{{ partial "icon-search.svg" . }}</button>
        <input type="search" class="search-form__input" name="query" placeholder="{{ i18n "header.searchbar.placeholder" }}" autocomplete="off" id="search-input" />
        <div class="search-dropdown" id="search-dropdown" hidden></div>
      </form>
      <div class="lang-switch" role="navigation" aria-label="Language">
        {{- range .Translations -}}
        <a class="lang-switch__link" href="{{ .RelPermalink }}" hreflang="{{ .Lang }}">{{ .Language.Label }}</a>
        {{- end -}}
      </div>
    </nav>
  </div>
</header>
